services:
  - type: web
    name: betgenius-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --chdir /opt/render/project/src

    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REFRESH_TOKEN
        value: betgenius2025
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
